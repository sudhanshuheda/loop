<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrow-navy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d3a8a"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="#fdfcfa"/>

  <!-- brand -->
  <text x="80" y="86" font-size="22" font-weight="700" fill="#0a0a0a" letter-spacing="-0.3">Loop<tspan fill="#1d3a8a"> · v0.1</tspan></text>

  <!-- headline -->
  <text x="80" y="240" font-size="68" font-weight="700" fill="#0a0a0a" letter-spacing="-1.6">
    <tspan x="80">Procurement was built for humans.</tspan>
    <tspan x="80" dy="84">Now both sides are agents.</tspan>
  </text>

  <!-- subhead -->
  <text x="80" y="448" font-size="22" fill="#555" letter-spacing="-0.2">
    <tspan x="80">An open JSON format for procurement messages.</tspan>
    <tspan x="80" dy="32">Rides inside email. Humans read prose. Agents read JSON.</tspan>
  </text>

  <!-- TODAY card -->
  <g transform="translate(80, 580)">
    <rect width="720" height="240" rx="14" fill="#ffffff" stroke="#e8e4dc" stroke-width="1"/>
    <text x="28" y="44" font-size="12" font-weight="700" fill="#b45309" letter-spacing="2">TODAY</text>

    <g transform="translate(28, 78)">
      <rect width="200" height="64" rx="8" fill="#fef3e0"/>
      <text x="100" y="38" font-size="15" font-weight="600" fill="#b45309" text-anchor="middle">Buyer system</text>

      <path d="M 215 32 L 245 32" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arrow-amber)"/>

      <rect x="252" y="0" width="180" height="64" rx="8" fill="#fef3e0"/>
      <text x="342" y="32" font-size="15" font-weight="600" fill="#b45309" text-anchor="middle">Prose email</text>
      <text x="342" y="50" font-size="11" fill="#b45309" text-anchor="middle">(structure lost)</text>

      <path d="M 437 32 L 467 32" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arrow-amber)"/>

      <rect x="474" y="0" width="216" height="64" rx="8" fill="#fef3e0"/>
      <text x="582" y="32" font-size="15" font-weight="600" fill="#b45309" text-anchor="middle">Supplier AI</text>
      <text x="582" y="50" font-size="11" fill="#b45309" text-anchor="middle">re-extracts (~8 LLM calls)</text>
    </g>

    <text x="28" y="200" font-size="14" fill="#555">
      <tspan x="28">Lossy at every hop. Every supplier-side AI vendor</tspan>
      <tspan x="28" dy="20">reinventing the same extraction layer.</tspan>
    </text>
  </g>

  <!-- WITH LOOP card -->
  <g transform="translate(820, 580)">
    <rect width="700" height="240" rx="14" fill="#ffffff" stroke="#e8e4dc" stroke-width="1"/>
    <text x="28" y="44" font-size="12" font-weight="700" fill="#1d3a8a" letter-spacing="2">WITH LOOP</text>

    <g transform="translate(28, 78)">
      <rect width="200" height="64" rx="8" fill="#eef2fb"/>
      <text x="100" y="38" font-size="15" font-weight="600" fill="#1d3a8a" text-anchor="middle">Buyer system</text>

      <path d="M 215 32 L 245 32" stroke="#1d3a8a" stroke-width="2" fill="none" marker-end="url(#arrow-navy)"/>

      <rect x="252" y="0" width="180" height="64" rx="8" fill="#eef2fb"/>
      <text x="342" y="32" font-size="15" font-weight="600" fill="#1d3a8a" text-anchor="middle">Email + JSON</text>
      <text x="342" y="50" font-size="11" fill="#1d3a8a" text-anchor="middle">(prose + structure)</text>

      <path d="M 437 32 L 467 32" stroke="#1d3a8a" stroke-width="2" fill="none" marker-end="url(#arrow-navy)"/>

      <rect x="474" y="0" width="196" height="64" rx="8" fill="#eef2fb"/>
      <text x="572" y="32" font-size="15" font-weight="600" fill="#1d3a8a" text-anchor="middle">Supplier AI</text>
      <text x="572" y="50" font-size="11" fill="#1d3a8a" text-anchor="middle">parses directly · zero scraping</text>
    </g>

    <text x="28" y="200" font-size="14" fill="#555">
      <tspan x="28">Units, currencies, line-item IDs preserved.</tspan>
      <tspan x="28" dy="20">Suppliers without Loop still see a normal email.</tspan>
    </text>
  </g>

  <!-- footer -->
  <text x="80" y="868" font-size="14" fill="#888" letter-spacing="-0.1">github.com/sudhanshuheda/loop · sudhanshuheda.github.io/loop · Apache-2.0</text>
</svg>
